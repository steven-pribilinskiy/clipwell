# Aylith catalog notifier. Pings aylith.com to rebuild its catalog whenever this
# repo pushes to its default branch, so the studio index stays current.
#
# Canonical copy lives in aylith-labs/aylith-com (.aylith/templates/). Rolled out
# to product repos by aylith-com/scripts/rollout-notifier.sh — edit there, not here.
#
# Requires the org-level Actions secret CATALOG_DISPATCH_TOKEN (a PAT/App token
# permitted to dispatch to aylith-labs/aylith-com).
name: Notify Aylith catalog

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CATALOG_DISPATCH_TOKEN }}
          repository: aylith-labs/aylith-com
          event-type: catalog-refresh
