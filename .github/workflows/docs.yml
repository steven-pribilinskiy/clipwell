name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'engineering/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build feature docs (site root)
        working-directory: docs
        env:
          PAGES_BASE: /clipwell
        run: |
          npm ci
          npm run build

      - name: Build engineering docs (/engineering)
        working-directory: engineering
        env:
          PAGES_BASE: /clipwell/engineering
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/out/* _site/
          mkdir -p _site/engineering
          cp -r engineering/out/* _site/engineering/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
