name: Screenshots

# Regenerates documentation screenshots + the web visual-regression baselines and
# opens a PR with the result. Manual only — never on push (it commits media).
#
# - web: deterministic Playwright capture (the same suite CI gates on). Produces the
#   Linux baselines (tests/__screenshots__/*-linux.png) that the `web-visual` gate in
#   ci.yml needs, plus the web docs media (media/shots/<state>/web-*.png).
# - windows native: the PrintWindow capture script on a Windows runner.
# - linux native: the Avalonia picker under Xvfb, grabbed window-by-window with `import`.
#
# macOS native is NOT captured here (CI screen-recording permission blocks `screencapture`);
# see the note at the bottom. Surfaces only appear in the docs once their media is committed
# AND added to DEFAULT_SURFACES in docs/src/components/shot-switcher.tsx.
on:
  workflow_dispatch:
  # TEMPORARY (remove before merge): lets the workflow run from the feature branch,
  # since workflow_dispatch only resolves workflows on the default branch.
  push:
    branches: [feat/multi-surface-screenshots]

permissions:
  contents: write
  pull-requests: write

jobs:
  web:
    name: web (baselines + docs media)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build daemon (Release)
        run: dotnet build daemon/Clipwell.Daemon.csproj -c Release
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: webui
        run: bun install --frozen-lockfile
      - name: Build SPA
        working-directory: webui
        run: bun run build
      - name: Install Playwright Chromium
        working-directory: webui
        run: bun x playwright install --with-deps chromium
      - name: Capture (update baselines + export docs media)
        working-directory: webui
        run: bun run test:visual:update
      - name: Upload baselines + media (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: web-baselines-media
          path: |
            webui/tests/__screenshots__/**
            docs/public/media/shots/**/web-*.png
          if-no-files-found: warn
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/screenshots-web
          title: 'chore: refresh web screenshots + visual baselines'
          commit-message: 'chore: refresh web screenshots + visual baselines'
          body: Auto-generated by the Screenshots workflow (web surface).
          add-paths: |
            docs/public/media/shots/**
            webui/tests/__screenshots__/**

  windows-native:
    name: windows native (PrintWindow)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build (Release)
        run: dotnet build clipwell.slnx -c Release
      - name: Capture
        run: powershell -ExecutionPolicy Bypass -File bench/capture-shots.ps1
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/screenshots-windows
          title: 'chore: refresh Windows native screenshots'
          commit-message: 'chore: refresh Windows native screenshots'
          body: Auto-generated by the Screenshots workflow (windows surface).
          add-paths: |
            docs/public/media/shots/**

  linux-native:
    name: linux native (Xvfb + import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build (Release)
        run: dotnet build clipwell.slnx -c Release
      - name: Install capture tooling + Avalonia X11 deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb imagemagick xdotool wmctrl x11-utils openbox \
            libice6 libsm6 libfontconfig1 libx11-6 libxrandr2 libxcursor1 libxi6 libgl1 libegl1
      - name: Capture
        run: |
          xvfb-run -a --server-args="-screen 0 1600x1200x24" \
            bash -c "openbox & sleep 2; pwsh bench/capture-native.ps1 linux"
      - name: Upload shots (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: linux-native-shots
          path: docs/public/media/shots/**/linux-*.png
          if-no-files-found: warn
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/screenshots-linux
          title: 'chore: refresh Linux native screenshots'
          commit-message: 'chore: refresh Linux native screenshots'
          body: Auto-generated by the Screenshots workflow (linux surface).
          add-paths: |
            docs/public/media/shots/**

  # macOS native is intentionally omitted: `screencapture` on the CI runner triggers a
  # screen-recording (TCC) permission prompt that headless CI can't grant, so the grab
  # is blocked even though the picker renders correctly. Needs a self-hosted Mac (or a
  # TCC pre-grant) — see bench/capture-native.ps1's `macos` branch, kept for that path.
