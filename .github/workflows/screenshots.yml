name: Screenshots

# Regenerates documentation screenshots + the web visual-regression baselines and
# uploads them as artifacts. Manual only. Download the artifacts and commit the files
# (the `web-visual` gate in ci.yml compares against the committed Linux baselines):
#
#   gh run download <run-id> -n web-baselines-media   # webui/tests/__screenshots__/*-linux.png + web docs media
#   gh run download <run-id> -n linux-native-shots     # docs/public/media/shots/<state>/linux-*.png
#   gh run download <run-id> -n windows-native-shots    # docs/public/media/shots/<state>/windows-*.png
#
# Surfaces:
# - web    — deterministic Playwright capture (the same suite ci.yml gates on).
# - linux  — the Avalonia picker under Xvfb, grabbed window-by-window with `import`.
# - windows— the PrintWindow capture script on a Windows runner.
# macOS native is omitted: `screencapture` on the CI runner hits a screen-recording (TCC)
# permission prompt that headless CI can't grant (the picker renders fine — it just can't
# be grabbed). Needs a self-hosted Mac; bench/capture-native.ps1 keeps the `macos` branch.
#
# A surface only shows in the docs once its media is committed AND added to
# DEFAULT_SURFACES in docs/src/components/shot-switcher.tsx.
on:
  workflow_dispatch:

jobs:
  web:
    name: web (baselines + docs media)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build daemon (Release)
        run: dotnet build daemon/Clipwell.Daemon.csproj -c Release
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: webui
        run: bun install --frozen-lockfile
      - name: Build SPA
        working-directory: webui
        run: bun run build
      - name: Install Playwright Chromium
        working-directory: webui
        run: bun x playwright install --with-deps chromium
      - name: Capture (update baselines + export docs media)
        working-directory: webui
        run: bun run test:visual:update
      - name: Upload baselines + media
        uses: actions/upload-artifact@v4
        with:
          name: web-baselines-media
          path: |
            webui/tests/__screenshots__/**
            docs/public/media/shots/**/web-*.png
          if-no-files-found: warn

  windows-native:
    name: windows native (PrintWindow)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build (Release)
        run: dotnet build clipwell.slnx -c Release
      - name: Capture
        run: powershell -ExecutionPolicy Bypass -File bench/capture-shots.ps1
      - name: Upload shots
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-shots
          path: docs/public/media/shots/**/windows-*.png
          if-no-files-found: warn

  linux-native:
    name: linux native (Xvfb + import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build (Release)
        run: dotnet build clipwell.slnx -c Release
      - name: Install capture tooling + Avalonia X11 deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb imagemagick xdotool wmctrl x11-utils openbox \
            libice6 libsm6 libfontconfig1 libx11-6 libxrandr2 libxcursor1 libxi6 libgl1 libegl1
      - name: Capture
        run: |
          xvfb-run -a --server-args="-screen 0 1600x1200x24" \
            bash -c "openbox & sleep 2; pwsh bench/capture-native.ps1 linux"
      - name: Upload shots
        uses: actions/upload-artifact@v4
        with:
          name: linux-native-shots
          path: docs/public/media/shots/**/linux-*.png
          if-no-files-found: warn
