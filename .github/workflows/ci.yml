name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'engineering/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'engineering/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  build-test:
    name: build + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build (Release)
        run: dotnet build clipwell.slnx -c Release

      # Linux needs an X server + a clipboard CLI for the watcher round-trip.
      - name: Install Linux clipboard tooling
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb xclip

      - name: Smoke (Linux, under Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a bash scripts/ci-smoke.sh

      - name: Smoke (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/ci-smoke.sh

      - name: Smoke (Windows)
        if: runner.os == 'Windows'
        run: pwsh -File scripts/ci-smoke.ps1

  webui:
    name: webui (frontend checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: webui
        run: bun install --frozen-lockfile
      - name: Type-check (tsgo)
        working-directory: webui
        run: bun run typecheck
      - name: Lint (Biome)
        working-directory: webui
        run: bun run lint
      - name: Dead code (knip)
        working-directory: webui
        run: bun run knip
      - name: Build
        working-directory: webui
        run: bun run build

  web-visual:
    name: web visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # global-setup runs `dotnet <Clipwell.Daemon.dll>` to serve the seeded SPA.
      - name: Build daemon (Release)
        run: dotnet build daemon/Clipwell.Daemon.csproj -c Release
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: webui
        run: bun install --frozen-lockfile
      - name: Build SPA
        working-directory: webui
        run: bun run build
      - name: Install Playwright Chromium
        working-directory: webui
        run: bun x playwright install --with-deps chromium
      # Strict check against the committed Linux baselines (tests/__screenshots__/*-linux.png).
      # Seed/refresh those baselines with the "Screenshots" workflow (runs test:visual:update).
      - name: Visual regression
        working-directory: webui
        run: bun run test:visual
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webui/playwright-report
          retention-days: 7
